services:
  valkey-primary:
    image: docker.io/valkey/valkey:9.0.3
    container_name: valkey-primary
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    volumes:
      # 去掉了 :ro，允许哨兵在故障转移时重写主从状态
      - ./conf/primary/:/usr/local/etc/valkey:Z
      - ./data/primary:/data:Z
    ports:
      - "6380:6379"
    networks:
      - valkey-net

  valkey-replica-1:
    image: docker.io/valkey/valkey:9.0.3
    container_name: valkey-replica-1
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    depends_on:
      - valkey-primary
    volumes:
      - ./conf/replica1/:/usr/local/etc/valkey:Z
      - ./data/replica1:/data:Z
    ports:
      - "6381:6379"
    networks:
      - valkey-net

  valkey-replica-2:
    image: docker.io/valkey/valkey:9.0.3
    container_name: valkey-replica-2
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    depends_on:
      - valkey-primary
    volumes:
      - ./conf/replica2:/usr/local/etc/valkey:Z
      - ./data/replica2:/data:Z
    ports:
      - "6382:6379"
    networks:
      - valkey-net

  # --- 哨兵集群 ---
  
  sentinel-1:
    image: docker.io/valkey/valkey:9.0.3
    container_name: valkey-sentinel-1
    command: ["valkey-sentinel", "/usr/local/etc/valkey/sentinel.conf"]
    depends_on:
      - valkey-primary
    volumes:
      # Linux 内核不允许对一个正处于挂载点状态的文件执行 rename 操作
      # Sentinel 更新配置 创建一个临时文件更改 然后调用rename（）函数替换原有的conf文件
      # 所以挂载目录最好
      # 这里s1 中的配置文件名字一定要对  不然起不来
      - ./conf/s1:/usr/local/etc/valkey:Z
    ports:
      - "26380:26379"
    networks:
      - valkey-net

  sentinel-2:
    image: docker.io/valkey/valkey:9.0.3
    container_name: valkey-sentinel-2
    command: ["valkey-sentinel", "/usr/local/etc/valkey/sentinel.conf"]
    depends_on:
      - valkey-primary
    volumes:
      - ./conf/s2:/usr/local/etc/valkey:Z
    ports:
      - "26381:26379"
    networks:
      - valkey-net

  sentinel-3:
    image: docker.io/valkey/valkey:9.0.3
    container_name: valkey-sentinel-3
    command: ["valkey-sentinel", "/usr/local/etc/valkey/sentinel.conf"]
    depends_on:
      - valkey-primary
    volumes:
      - ./conf/s3:/usr/local/etc/valkey:Z
    ports:
      - "26382:26379"
    networks:
      - valkey-net

networks:
  valkey-net:
    driver: bridge
