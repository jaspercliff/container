# 所有人可以连接
bind 0.0.0.0
# password
requirepass passwd
# aof
appendonly yes

cluster-enabled yes
# 不需要用户维护
cluster-config-file nodes-6379.conf
# 节点心跳失败时间
cluster-node-timeout 15000

# ms 15s 
cluster-node-timeout 15000
# 设置为 0。这意味着无论 Slave 掉线多久，它都会尝试在 Master 挂掉时接管
cluster-replica-validity-factor 10

masterauth passwd

################## container config ##################

cluster-announce-ip  192.168.31.36
cluster-announce-port 6384
# 集群之间通信端口
cluster-announce-bus-port 16384
