      - ./data/node-4:/data
    ports:
      - "6383:6379"
      - "16383:16380"
  valkey-5:
    <<: *valkey-base
    container_name: valkey-5
    volumes:
      - ./conf/node-5:/usr/local/etc/valkey
      - ./data/node-5:/data
    ports:
      - "6384:6379"
      - "16384:16380"
  valkey-6:
    <<: *valkey-base
    container_name: valkey-6
    volumes:
      - ./conf/node-6:/usr/local/etc/valkey
