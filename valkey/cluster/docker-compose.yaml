    <<: *valkey-base
    container_name: valkey-3 
    volumes:
      - ./conf/node-3:/usr/local/etc/valkey
      - ./data/node-3:/data
    ports:
      - "6382:6379"
      - "16382:16380"
  valkey-4:
    <<: *valkey-base
    container_name: valkey-4
