networks:
  valkey-net:
    driver: bridge
services:
  valkey-1: &valkey-base
    image: valkey/valkey:9.0.3
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    networks:
      - valkey-net
    container_name: valkey-1
    volumes:
      - ./conf/node-1:/usr/local/etc/valkey
      - ./data/node-1:/data
    ports:
      - "6380:6379"
      - "16380:16380"
  valkey-2:
    <<: *valkey-base
    container_name: valkey-2 
    volumes:
      - ./conf/node-2:/usr/local/etc/valkey
      - ./data/node-2:/data
    ports:
      - "6381:6379"
      - "16381:16380"
